<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">FlowGrid MemoryAgent architecture</title>
  <desc id="desc">Qwen Cloud extracts pending memory from user turns. Human authorization promotes it to confirmed memory, which is retrieved under a context budget for future Qwen answers. Alibaba Cloud hosts the API.</desc>
  <style>
    .bg { fill:#f4ecd9 } .box { fill:#fbf5e8; stroke:#2a251f; stroke-width:2 } .qwen { fill:#204dff; stroke:#204dff } .pending { fill:#9d3024; stroke:#9d3024 } .label { fill:#2a251f; font:700 27px Arial,sans-serif } .small { fill:#2a251f; font:16px Georgia,serif } .inverse { fill:#fff; font:700 26px Arial,sans-serif } .mono { fill:#665b4e; font:12px monospace; letter-spacing:1.6px } .line { stroke:#2a251f; stroke-width:3; fill:none; marker-end:url(#arrow) }
  </style>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2a251f"/></marker></defs>
  <rect class="bg" width="1200" height="680"/>
  <text x="70" y="72" class="mono">FLOWGRID MEMORYAGENT / QWEN CLOUD</text>
  <text x="70" y="122" class="label">Persistent memory with an authorization boundary.</text>
  <rect class="box" x="70" y="210" width="220" height="130"/><text x="95" y="258" class="label">User turn</text><text x="95" y="293" class="small">Preference, request,</text><text x="95" y="317" class="small">or correction</text>
  <path class="line" d="M290 275 H390"/>
  <rect class="qwen" x="405" y="190" width="270" height="170" rx="4"/><text x="430" y="248" class="inverse">Qwen Cloud</text><text x="430" y="286" fill="#fff" class="small">structured extraction</text><text x="430" y="313" fill="#fff" class="small">source + confidence</text>
  <path class="line" d="M675 275 H765"/>
  <rect class="pending" x="780" y="210" width="250" height="130"/><text x="805" y="258" class="inverse">Pending memory</text><text x="805" y="294" fill="#fff" class="small">never authoritative</text>
  <path class="line" d="M905 340 V445"/>
  <rect class="box" x="770" y="460" width="270" height="130"/><text x="795" y="507" class="label">Human gate</text><text x="795" y="542" class="small">approve / reject / revise</text>
  <path class="line" d="M770 525 H510"/>
  <rect class="box" x="230" y="460" width="265" height="130"/><text x="255" y="507" class="label">Confirmed memory</text><text x="255" y="542" class="small">persistent, traceable,</text><text x="255" y="566" class="small">supersedable</text>
  <path class="line" d="M360 460 V395"/>
  <rect class="box" x="120" y="365" width="240" height="70"/><text x="145" y="407" class="small">context-budget retrieval</text>
  <path class="line" d="M360 400 H520"/>
  <rect class="qwen" x="535" y="365" width="260" height="70" rx="4"/><text x="558" y="407" class="inverse">Later Qwen answer</text>
  <text x="70" y="644" class="mono">ALIBABA CLOUD FUNCTION COMPUTE HOSTS THE API; QWEN CLOUD PROVIDES REASONING.</text>
</svg>
